name: Sync to Sfera.Code

on:
  push:
    branches:
      - '**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Add Sfera.Code remote with URL-encoded credentials
        env:
          SFERA_USERNAME: ${{ secrets.SFERA_USERNAME }}
          SFERA_PASSWORD: ${{ secrets.SFERA_PASSWORD }}
          SFERA_URL: ${{ secrets.SFERA_REPO_URL }}
        run: |
          # URL-кодируем логин и пароль (заменяем специальные символы)
          ENCODED_USER=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$SFERA_USERNAME', safe=''))")
          ENCODED_PASS=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$SFERA_PASSWORD', safe=''))")
          
          # Вставляем закодированные credentials в URL
          AUTH_URL=$(echo "$SFERA_URL" | sed "s|https://|https://${ENCODED_USER}:${ENCODED_PASS}@|")
          git remote add sfera "$AUTH_URL"

      - name: Push to Sfera.Code
        run: |
          git push --force sfera --all
          git push --force sfera --tags